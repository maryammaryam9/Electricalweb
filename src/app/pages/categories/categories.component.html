<div class="bg-gray-100 pb-10 pt-10 px-4">
  <div class="max-w-7xl mx-auto">
    <!-- Section Heading -->
    <div class="text-center mb-10 px-4">
      <h2
        class="text-2xl sm:text-3xl md:text-4xl font-extrabold tracking-tight inline-flex flex-wrap justify-center items-center gap-2"
      >
        ⚡
        <span class="text-gray-800">Our</span>
        <span class="relative inline-block">
          <span
            class="bg-gradient-to-r from-yellow-400 to-yellow-600 bg-clip-text text-transparent"
          >
            Categories
          </span>
          <!-- Underline only under "Categories" -->
          <span
            class="absolute left-0 -bottom-1 w-full h-1 bg-gradient-to-r from-yellow-400 to-yellow-600 rounded-full"
          ></span>
        </span>
      </h2>

      <p
        class="text-gray-600 mt-4 max-w-xl mx-auto text-sm sm:text-base md:text-lg leading-relaxed"
      >
        We offer a wide range of professional electrical services to meet all
        your residential and commercial needs.
      </p>
    </div>

    <!-- Services Grid -->

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
      <div
        *ngFor="let service of services"
        class="bg-white rounded-2xl shadow-md overflow-hidden"
      >
        <!-- Image + Title -->
        <div class="relative">
          <img
            [src]="service.imageSrc"
            alt="{{ service.title }}"
            class="w-full h-64 object-cover"
          />

          <!-- Subtle dark overlay -->
          <div class="absolute inset-0 bg-black/40"></div>

          <!-- Title -->
          <div class="absolute inset-0 flex items-center justify-center">
            <span class="text-white text-xl font-semibold z-10">
              {{ service.title }}
            </span>
          </div>
        </div>

        <!-- Content -->
        <div class="p-6 flex">
          <div class="w-1.5 bg-yellow-400 rounded"></div>

          <div class="pl-4">
          <p class="text-sm text-gray-700 line-clamp-3">
  {{ service.description }}
</p>


            <button
              class="mt-6 bg-[#231c14] text-white px-6 py-2 rounded-full font-semibold hover:bg-yellow-400 hover:text-black transition"
            >
              Read More
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
